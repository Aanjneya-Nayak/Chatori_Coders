
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlavorShift - A Sensory Culinary Journey</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,700&family=Caveat:wght@400;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --spice-red: #B22222;
        --saffron: #FFC857;
        --curry: #FF7A00;
        --earth-brown: #4E342E;
        --cream: #FFF3E0;
        --bg-deep: #1A1A1A;
      }
      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background-color: var(--bg-deep);
        color: var(--cream);
        overflow-x: hidden;
      }
      .font-accent {
        font-family: 'Caveat', cursive;
      }
      .font-serif {
        font-family: 'Playfair Display', serif;
      }
      .glass {
        background: rgba(26, 26, 26, 0.7);
        backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
      .recipe-card {
        background: linear-gradient(135deg, rgba(78, 52, 46, 0.9) 0%, rgba(26, 26, 26, 0.95) 100%);
        border: 1px solid rgba(255, 200, 87, 0.1);
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      }
      .wood-texture {
        background-color: #1a1a1a;
        background-image: url("https://www.transparenttextures.com/patterns/wood-pattern-gray.png");
      }
      .spice-gradient {
        background: linear-gradient(135deg, var(--spice-red) 0%, var(--curry) 100%);
      }
      .saffron-gradient {
        background: linear-gradient(135deg, var(--saffron) 0%, var(--curry) 100%);
      }
      @keyframes steam {
        0% { transform: translateY(0) scale(1); opacity: 0; }
        50% { opacity: 0.3; }
        100% { transform: translateY(-50px) scale(1.5); opacity: 0; }
      }
      .steam-particle {
        position: absolute;
        width: 30px;
        height: 30px;
        background: white;
        border-radius: 50%;
        filter: blur(15px);
        animation: steam 4s infinite ease-out;
      }
      .grain-overlay {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background-image: url("https://www.transparenttextures.com/patterns/carbon-fibre.png");
        opacity: 0.03;
        pointer-events: none;
        z-index: 100;
      }
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg-deep);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--earth-brown);
        border-radius: 10px;
      }
    </style>
    <script type="importmap">
    {
      "imports": {
        "framer-motion": "https://esm.sh/framer-motion@^12.34.0",
        "recharts": "https://esm.sh/recharts@^3.7.0",
        "react/": "https://esm.sh/react@^19.2.4/",
        "react": "https://esm.sh/react@^19.2.4",
        "@google/genai": "https://esm.sh/@google/genai@^1.41.0",
        "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
        "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0"
      }
    }
    </script>
  <link rel="stylesheet" href="/index.css">
</head>
  <body class="wood-texture selection:bg-orange-500/30">
    <div class="grain-overlay"></div>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
